name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install renderer dependencies
        run: cd renderer && npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build frontend
        run: cd renderer && npm run build

      - name: Lint check (if available)
        run: npx eslint src --ext .js,.jsx || echo "Lint not configured — skipping"
        continue-on-error: true
